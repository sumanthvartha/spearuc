<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CascadeHQ Notification Test</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, sans-serif;
    background: #09090B; color: #F1F5F9;
    padding: 40px 20px; text-align: center;
    min-height: 100vh;
  }
  h2 { font-size: 22px; margin-bottom: 8px; }
  .sub { font-size: 13px; color: #64748B; margin-bottom: 24px; }
  #status {
    padding: 12px 16px; border-radius: 10px;
    font-size: 13px; font-weight: 600;
    margin-bottom: 20px;
  }
  .pending { background: #FBBF2415; color: #FBBF24; border: 1px solid #FBBF2425; }
  .granted { background: #4ADE8015; color: #4ADE80; border: 1px solid #4ADE8025; }
  .error { background: #EF444415; color: #EF4444; border: 1px solid #EF444425; }
  .btn {
    display: block; width: 100%; padding: 16px;
    border: none; border-radius: 12px;
    font-size: 16px; font-weight: 700;
    cursor: pointer; margin-bottom: 12px;
    font-family: inherit;
  }
  .btn-blue { background: #3B82F6; color: #fff; }
  .btn-green { background: #16A34A; color: #fff; }
  .btn-gray { background: #1E1E2E; color: #94A3B8; border: 1px solid #333; }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .log {
    margin-top: 20px; text-align: left;
    background: #0F0F1A; border-radius: 10px;
    padding: 14px; font-size: 12px;
    font-family: monospace; color: #94A3B8;
    max-height: 300px; overflow-y: auto;
  }
  .log div { padding: 4px 0; border-bottom: 1px solid #1a1a2e; }
  .ok { color: #4ADE80; }
  .err { color: #EF4444; }
  .info { color: #3B82F6; }
  .steps {
    text-align: left; background: #0F0F1A;
    border-radius: 12px; padding: 16px;
    margin-bottom: 20px; border: 1px solid #222;
  }
  .steps h3 { font-size: 14px; margin-bottom: 10px; color: #FBBF24; }
  .steps p { font-size: 12px; color: #64748B; line-height: 1.6; margin-bottom: 6px; }
  .steps .num {
    display: inline-block; width: 20px; height: 20px;
    border-radius: 10px; background: #3B82F620;
    color: #3B82F6; font-size: 11px; font-weight: 700;
    text-align: center; line-height: 20px; margin-right: 6px;
  }
</style>
</head>
<body>

<h2>🔔 CascadeHQ</h2>
<p class="sub">Real notification test on your phone</p>

<div id="status" class="pending">⏳ Checking...</div>

<div class="steps" id="instructions">
  <h3>Test instructions</h3>
  <p><span class="num">1</span> Tap "Allow Notifications" below</p>
  <p><span class="num">2</span> Tap "Send Notification (5s delay)"</p>
  <p><span class="num">3</span> IMMEDIATELY go to your home screen</p>
  <p><span class="num">4</span> Wait 5 seconds — watch notification arrive</p>
</div>

<!-- Step 1: Register SW + Permission -->
<button class="btn btn-blue" id="allow-btn" onclick="setup()">
  Step 1: Allow Notifications
</button>

<!-- Step 2: Send notifications -->
<button class="btn btn-green" id="send5" onclick="sendAfter(5)" disabled>
  Step 2: Send Notification (5s delay)
</button>

<button class="btn btn-gray" id="send10" onclick="sendAfter(10)" disabled>
  Send Notification (10s delay)
</button>

<button class="btn btn-gray" id="send0" onclick="sendAfter(0)" disabled>
  Send Notification (instant)
</button>

<div class="log" id="log"></div>

<script>
let swReg = null;

function log(msg, type) {
  const el = document.getElementById('log');
  const t = new Date().toLocaleTimeString();
  el.innerHTML = `<div class="${type}">${t} — ${msg}</div>` + el.innerHTML;
}

function setStatus(text, cls) {
  const el = document.getElementById('status');
  el.textContent = text;
  el.className = cls;
}

// STEP 1: Register Service Worker + Ask Permission
async function setup() {
  try {
    // Register Service Worker
    log('Registering Service Worker...', 'info');
    swReg = await navigator.serviceWorker.register('/sw.js');
    log('Service Worker registered ✓', 'ok');

    // Wait for it to be active
    await navigator.serviceWorker.ready;
    log('Service Worker active ✓', 'ok');

    // Ask notification permission
    log('Requesting notification permission...', 'info');
    const perm = await Notification.requestPermission();
    log('Permission: ' + perm, perm === 'granted' ? 'ok' : 'err');

    if (perm === 'granted') {
      setStatus('✅ Ready — Service Worker active, notifications allowed', 'granted');
      document.getElementById('allow-btn').style.display = 'none';
      document.getElementById('send5').disabled = false;
      document.getElementById('send10').disabled = false;
      document.getElementById('send0').disabled = false;
    } else {
      setStatus('❌ Permission denied — check browser settings', 'error');
    }

  } catch (e) {
    log('Error: ' + e.message, 'err');
    setStatus('❌ Error: ' + e.message, 'error');
  }
}

// STEP 2: Send notification after delay
function sendAfter(seconds) {
  if (!swReg) { log('No Service Worker — tap Step 1 first', 'err'); return; }

  log(`Notification in ${seconds}s — GO TO HOME SCREEN NOW`, 'ok');
  document.getElementById('send5').textContent = `⏳ ${seconds}s — GO TO HOME SCREEN`;

  setTimeout(async () => {
    try {
      await swReg.showNotification(
        '🔴 Q1 Sales Kickoff — LIVE NOW',
        {
          body: 'Rajesh Kumar is speaking · 147 people joined · Tap to join now',
          requireInteraction: true,
          vibrate: [400, 100, 400, 100, 400],
          tag: 'cascade-live',
          renotify: true,
          actions: [
            { action: 'join', title: '🟢 Join Now' },
            { action: 'dismiss', title: 'Dismiss' }
          ]
        }
      );
      log('✅ Notification sent!', 'ok');
      document.getElementById('send5').textContent = 'Step 2: Send Notification (5s delay)';
    } catch (e) {
      log('Send error: ' + e.message, 'err');
    }
  }, seconds * 1000);
}

// Check if SW is already registered
async function init() {
  if (!('serviceWorker' in navigator)) {
    setStatus('❌ Service Workers not supported', 'error');
    log('This browser does not support Service Workers', 'err');
    return;
  }

  if (!('Notification' in window)) {
    setStatus('❌ Notifications not supported', 'error');
    log('This browser does not support Notifications', 'err');
    return;
  }

  // Check if already set up from previous visit
  const reg = await navigator.serviceWorker.getRegistration();
  if (reg && Notification.permission === 'granted') {
    swReg = reg;
    setStatus('✅ Ready (from previous visit)', 'granted');
    document.getElementById('allow-btn').style.display = 'none';
    document.getElementById('send5').disabled = false;
    document.getElementById('send10').disabled = false;
    document.getElementById('send0').disabled = false;
    log('Service Worker already registered ✓', 'ok');
    log('Permission already granted ✓', 'ok');
  } else {
    setStatus('👆 Tap "Allow Notifications" to start', 'pending');
    log('Ready — waiting for setup', 'info');
  }
}

init();
</script>
</body>
</html>
